name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v1.2, latest)"
        required: false
        default: "serverless"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          # Lowercase GHCR namespace (required by spec)
          GHCR_NS="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/upscale-hdr"
          DH_NS="thepsych/upscale-hdr"
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "tags=${DH_NS}:${VERSION},${DH_NS}:serverless,${GHCR_NS}:${VERSION},${GHCR_NS}:serverless" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ inputs.tag }}"
            echo "tags=${DH_NS}:${TAG},${GHCR_NS}:${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=upscale-hdr
            org.opencontainers.image.description=AI video upscaling + HDR serverless worker
